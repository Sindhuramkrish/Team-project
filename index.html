<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do List App</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        text-align: center;
        margin-top: 50px;
    }

    .container {
        width: 400px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
    }

    input {
        width: 70%;
        padding: 10px;
    }

    button {
        padding: 10px;
        cursor: pointer;
        background: green;
        color: white;
        border: none;
        margin-left: 5px;
    }

    ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
    }

    li {
        background: #eee;
        margin: 10px 0;
        padding: 10px;
        display: flex;
        justify-content: space-between;
        border-radius: 5px;
    }

    .completed {
        text-decoration: line-through;
        color: gray;
    }

    .delete-btn {
        background: red;
        border: none;
        color: white;
        cursor: pointer;
        padding: 5px;
    }
</style>
</head>

<body>

<div class="container">
    <h2>To-Do List</h2>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>
</div>

<script>
    function addTask() {
        let input = document.getElementById("taskInput");
        let taskText = input.value;

        if (taskText === "") {
            alert("Please enter a task!");
            return;
        }

        let li = document.createElement("li");

        li.innerHTML = `
            <span onclick="toggleTask(this)">${taskText}</span>
            <button class="delete-btn" onclick="deleteTask(this)">X</button>
        `;

        document.getElementById("taskList").appendChild(li);

        input.value = "";
    }

    function deleteTask(button) {
        button.parentElement.remove();
    }

    function toggleTask(task) {
        task.classList.toggle("completed");
    }
</script>

</body>
</html>
